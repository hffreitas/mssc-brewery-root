version: '3.9'
services:
  db:
    image: postgres:14.0
    restart: always
    environment:
      POSTGRES_USER: beer_service
      POSTGRES_PASSWORD: beer
      POSTGRES_DB: beerservice
    ports:
      - "5432:5432"

  mq:
    build:
      context: ""
      dockerfile: Dockerfile
    ports:
      - "8161:8161"
      - "61616:61616"

  zipkin:
    image: openzipkin/zipkin
    ports:
      - "9411:9411"
    restart: unless-stopped